version: 2
updates:
  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch non-major updates into a single PR to cut review noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI workflow
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
