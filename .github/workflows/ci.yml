name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key_for_e2e

  supabase:
    name: Supabase
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Boots a local Postgres + Auth + Storage stack and applies every
      # migration in supabase/migrations in order. Fails the build on any
      # migration error (syntax, RLS, functions, triggers, storage policies).
      - name: Apply migrations
        run: supabase start

      - name: Run database tests (pgTAP)
        run: supabase test db

      - name: Stop stack
        if: always()
        run: supabase stop --no-backup

      - name: Install Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Edge Function tests
        run: deno test --allow-none supabase/functions/_shared/
